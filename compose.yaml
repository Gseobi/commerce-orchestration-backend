services:
  postgres:
    image: 'postgres:16-alpine'
    container_name: commerce-orchestration-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-commerce_orchestration}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-commerce}
      POSTGRES_USER: ${POSTGRES_USER:-commerce}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U commerce -d commerce_orchestration"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  kafka:
    image: bitnami/kafka:3.7
    container_name: commerce-orchestration-kafka
    ports:
      - '${KAFKA_PORT:-9092}:9092'
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:${KAFKA_PORT:-9092}
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_KRAFT_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      ALLOW_PLAINTEXT_LISTENER: "yes"
    healthcheck:
      test: ["CMD-SHELL", "/opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: commerce-orchestration-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - '${KAFKA_UI_PORT:-8085}:8080'
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

volumes:
  postgres_data:
