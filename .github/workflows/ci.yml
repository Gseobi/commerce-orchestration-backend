name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Grant execute permission for Gradle
        run: chmod +x gradlew

      - name: Compile
        run: ./gradlew --no-daemon --stacktrace compileJava

      - name: Test
        run: ./gradlew --no-daemon --stacktrace test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-unit-test-reports
          if-no-files-found: warn
          path: |
            build/reports/tests/test
            build/test-results/test

  integration-test:
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Grant execute permission for Gradle
        run: chmod +x gradlew

      - name: Verify Docker availability
        run: docker info

      - name: Run integration tests
        id: integration
        continue-on-error: true
        shell: bash
        run: |
          set +e
          ./gradlew --no-daemon --stacktrace --info integrationTest
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Report integration exit code
        if: always()
        run: |
          echo "integration exit code: ${{ steps.integration.outputs.exit_code }}"
          {
            echo "### integration-test result"
            echo
            echo "- exit code: ${{ steps.integration.outputs.exit_code }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Dump integration failure context
        if: always()
        run: |
          echo "== integration-test outcome =="
          echo "${{ steps.integration.outcome }}"
          echo
          echo "== integration test result files =="
          find build/test-results/integrationTest build/reports/tests/integrationTest -type f 2>/dev/null | sort || true
          echo
          echo "== first integration failure =="
          python3 - <<'PY'
          import xml.etree.ElementTree as ET
          from pathlib import Path

          xml_files = sorted(Path("build/test-results/integrationTest").rglob("*.xml"))
          first_failure = None

          for xml_file in xml_files:
              try:
                  root = ET.parse(xml_file).getroot()
              except Exception as exc:
                  print(f"failed to parse {xml_file}: {exc}")
                  continue

              suite_name = root.attrib.get("name", "<unknown suite>")
              for testcase in root.findall("testcase"):
                  failure = testcase.find("failure")
                  error = testcase.find("error")
                  node = failure if failure is not None else error
                  if node is None:
                      continue
                  first_failure = {
                      "xml_file": str(xml_file),
                      "suite": suite_name,
                      "testcase": testcase.attrib.get("name", "<unknown testcase>"),
                      "message": node.attrib.get("message", "").strip(),
                      "stacktrace": (node.text or "").strip(),
                  }
                  break
              if first_failure:
                  break

          if first_failure is None:
              print("no failing integration test found in XML results")
              raise SystemExit(0)

          print(f"xml file: {first_failure['xml_file']}")
          print(f"failing test class: {first_failure['suite']}")
          print(f"failing test case: {first_failure['testcase']}")
          print(f"failure message: {first_failure['message'] or '<empty>'}")
          print()

          lines = first_failure["stacktrace"].splitlines()
          caused_by_index = next((i for i, line in enumerate(lines) if "Caused by:" in line), 0)
          excerpt = lines[caused_by_index:caused_by_index + 80]
          if not excerpt:
              excerpt = lines[:80]

          print("first stack excerpt:")
          print("\n".join(excerpt) if excerpt else "<empty stacktrace>")
          PY

      - name: Upload integration test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-integration-test-reports
          if-no-files-found: warn
          path: |
            build/reports/tests/integrationTest
            build/test-results/integrationTest

      - name: Propagate integration test failure after diagnostics
        if: ${{ steps.integration.outputs.exit_code != '0' }}
        run: |
          echo "Propagating integration test failure after diagnostics"
          echo "integration exit code: ${{ steps.integration.outputs.exit_code }}"
          echo "artifacts: build/reports/tests/integrationTest, build/test-results/integrationTest"
          exit 1
