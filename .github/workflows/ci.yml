name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Grant execute permission for Gradle
        run: chmod +x gradlew

      - name: Compile
        run: ./gradlew --no-daemon --stacktrace compileJava

      - name: Test
        run: ./gradlew --no-daemon --stacktrace test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-unit-test-reports
          if-no-files-found: warn
          path: |
            build/reports/tests/test
            build/test-results/test

  integration-test:
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Grant execute permission for Gradle
        run: chmod +x gradlew

      - name: Verify Docker availability
        run: docker info

      - name: Run integration tests
        run: ./gradlew --no-daemon --stacktrace integrationTest

      - name: Upload integration test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-integration-test-reports
          if-no-files-found: warn
          path: |
            build/reports/tests/integrationTest
            build/test-results/integrationTest
