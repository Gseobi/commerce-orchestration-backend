spring:
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  docker:
    compose:
      enabled: false

app:
  security:
    jwt:
      secret: commerce-orchestration-integration-test-secret-key-2026
      access-token-validity-seconds: 3600
      issuer: commerce-orchestration-integration-test
  outbox:
    scheduler-enabled: false
    publish-fixed-delay: 1s
    batch-size: 100
    max-retry-count: 2
    initial-backoff: 0ms
    backoff-multiplier: 1.0
    max-backoff: 0ms
    publish-timeout: 5s
  payment:
    provider:
      mode: mock
