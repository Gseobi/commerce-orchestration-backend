spring:
  datasource:
    url: jdbc:h2:mem:commerce-orchestration;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  docker:
    compose:
      enabled: false
  kafka:
    bootstrap-servers: localhost:9092

app:
  security:
    jwt:
      secret: commerce-orchestration-test-secret-key-2026
      access-token-validity-seconds: 3600
      issuer: commerce-orchestration-test
  outbox:
    scheduler-enabled: false
    publish-fixed-delay: 10000
    batch-size: 100
