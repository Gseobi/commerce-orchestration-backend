spring:
  application:
    name: commerce-orchestration-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/commerce_orchestration}
    username: ${DB_USERNAME:commerce}
    password: ${DB_PASSWORD:commerce}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  docker:
    compose:
      enabled: false
  webflux:
    base-path: /

app:
  security:
    jwt:
      secret: ${JWT_SECRET:commerce-orchestration-demo-secret-key-2026}
      access-token-validity-seconds: 3600
      issuer: commerce-orchestration-backend
  outbox:
    scheduler-enabled: true
    publish-fixed-delay: 5s
    batch-size: 100
    max-retry-count: 3
    initial-backoff: 10s
    backoff-multiplier: 2.0
    max-backoff: 5m
    publish-timeout: 3s
  payment:
    provider:
      mode: ${PAYMENT_PROVIDER_MODE:mock}
      base-url: ${PAYMENT_PROVIDER_BASE_URL:http://localhost:8089}
      api-key: ${PAYMENT_PROVIDER_API_KEY:}
      approve-path: ${PAYMENT_PROVIDER_APPROVE_PATH:/payments/approve}
      cancel-path: ${PAYMENT_PROVIDER_CANCEL_PATH:/payments/cancel}
      connect-timeout: ${PAYMENT_PROVIDER_CONNECT_TIMEOUT:2s}
      read-timeout: ${PAYMENT_PROVIDER_READ_TIMEOUT:3s}
      mock-failure-token: ${PAYMENT_PROVIDER_MOCK_FAILURE_TOKEN:FAIL_PAYMENT}
